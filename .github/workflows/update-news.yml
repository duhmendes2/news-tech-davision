name: Atualizar HotNews Dashboard

on:
  schedule:
    - cron: '0 10 * * *'   # Todo dia às 07:00 horário de Brasília (10:00 UTC)
  workflow_dispatch:         # Permite rodar manualmente pelo GitHub

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Rodar update-news.js
        env:
          APIFY_API_KEY: ${{ secrets.APIFY_API_KEY }}
        run: node update-news.js

      - name: Copiar dashboard para index.html
        run: cp news-dashboard.html index.html

      - name: Commit e push das atualizações
        run: |
          git config user.name "HotNews Bot"
          git config user.email "hotnews-bot@users.noreply.github.com"
          git add news-dashboard.html index.html news-latest.json
          git diff --staged --quiet || git commit -m "chore: atualizar dashboard $(date +'%d/%m/%Y %H:%M')"
          git push
